{% raw %}<script type="text/babel">
  try {
    // ── データ読み込み ────────────────────────────────────
    const answers = JSON.parse(document.getElementById('answers-data').textContent);
    const meta    = JSON.parse(document.getElementById('meta-data').textContent);
    const CT      = JSON.parse(document.getElementById('conversion-table').textContent);

    // ── 素点換算（評価点取得）────────────────────────────
    function getEP(gender, key, raw) {
      const table = CT[gender]?.[key];
      if (!table) return 3;
      const match = table.find(t => raw >= t.min && raw <= t.max);
      return match ? match.point : 3;
    }

    // ── 素点計算 & 評価点計算 ────────────────────────────
    function calcProfile(q, gender) {
      // 性別マッピング: フォーム値 '男性'/'女性' → 変換表キー 'male'/'female'
      const g = gender === '女性' ? 'female' : 'male';
      // 素点（MHLW 57問マッピング）
      const raw = {
        A1_quantity:      15 - (q.q1  + q.q2  + q.q3),
        A2_quality:       15 - (q.q4  + q.q5  + q.q6),
        A3_physical:       5 -  q.q7,
        A4_interpersonal: 10 - (q.q12 + q.q13) + q.q14,
        A5_environment:    5 -  q.q15,
        A6_control:       15 - (q.q8  + q.q9  + q.q10),
        A7_skill:               q.q11,
        A8_suitability:    5 -  q.q16,
        A9_reward:         5 -  q.q17,
        B1_vigor:          q.q18 + q.q19 + q.q20,
        B2_irritation:     q.q21 + q.q22 + q.q23,
        B3_fatigue:        q.q24 + q.q25 + q.q26,
        B4_anxiety:        q.q27 + q.q28 + q.q29,
        B5_depression:     q.q30 + q.q31 + q.q32 + q.q33 + q.q34 + q.q35,
        B6_physical:       q.q36 + q.q37 + q.q38 + q.q39 + q.q40 + q.q41 +
                           q.q42 + q.q43 + q.q44 + q.q45 + q.q46,
        C1_boss:     15 - (q.q47 + q.q50 + q.q53),
        C2_coworker: 15 - (q.q48 + q.q51 + q.q54),
        C3_family:   15 - (q.q49 + q.q52 + q.q55),
        D1_satisfaction: 10 - (q.q56 + q.q57),
      };
      // 評価点（1〜5, MHLW 素点換算表に準拠）
      const ep = {};
      for (const [key, val] of Object.entries(raw)) {
        ep[key] = getEP(g, key, val);
      }
      // ── ドメイン合計（画面表示用・厚労省公式方式その1と同じ計算）────────
      // ※高ストレス判定（True/False）はバックエンド app.py が方式その2（ep合計）で実施済み
      // 非★(A1-A5)は低ep=良好なので 6-ep に変換して合算、★はep直接
      const sumA = (6-ep.A1_quantity) + (6-ep.A2_quality) + (6-ep.A3_physical) +
                   (6-ep.A4_interpersonal) + (6-ep.A5_environment) +
                   ep.A6_control + ep.A7_skill + ep.A8_suitability + ep.A9_reward;
      // B1★はそのまま、非★(B2-B6)は 6-ep 変換
      const sumB = ep.B1_vigor + (6-ep.B2_irritation) + (6-ep.B3_fatigue) +
                   (6-ep.B4_anxiety) + (6-ep.B5_depression) + (6-ep.B6_physical);
      // C全★・D1★はそのまま合算（表示用なのでD1も含む）
      const sumC = ep.C1_boss + ep.C2_coworker + ep.C3_family + ep.D1_satisfaction;

      // ── レーダー用ヘルススコア（MHLW公式準拠）──────────────────────────
      // 全軸で「外周=良好(5) / 中心=要注意(1)」に統一
      // 非★軸(A1-A5,B2-B6): 低ep=低負担=良好 → 6-ep で外周=良好に変換
      // ★軸(A6-A9,B1,C1-C3,D1): 高ep=高リソース=良好 → ep直接使用
      const STAR_AXES = new Set([
        'A6_control','A7_skill','A8_suitability','A9_reward',
        'B1_vigor',
        'C1_boss','C2_coworker','C3_family','D1_satisfaction'
      ]);
      const health = (key) => STAR_AXES.has(key) ? ep[key] : 6 - ep[key];
      return {
        ep, sumA, sumB, sumC,
        factors: [
          {label:'量的負担',       value: health('A1_quantity')},
          {label:'質的負担',       value: health('A2_quality')},
          {label:'身体的負担',     value: health('A3_physical')},
          {label:'対人関係',       value: health('A4_interpersonal')},
          {label:'職場環境',       value: health('A5_environment')},
          {label:'コントロール',   value: health('A6_control')},
          {label:'技能活用',      value: health('A7_skill')},
          {label:'適性度',        value: health('A8_suitability')},
          {label:'働きがい',      value: health('A9_reward')},
        ],
        reactions: [
          {label:'活気',          value: health('B1_vigor')},
          {label:'イライラ感',    value: health('B2_irritation')},
          {label:'疲労感',        value: health('B3_fatigue')},
          {label:'不安感',        value: health('B4_anxiety')},
          {label:'抑うつ感',      value: health('B5_depression')},
          {label:'身体愁訴',      value: health('B6_physical')},
        ],
        supports: [
          {label:'上司サポート',       value: health('C1_boss')},
          {label:'同僚サポート',       value: health('C2_coworker')},
          {label:'家族・友人',         value: health('C3_family')},
          {label:'仕事・生活満足度',   value: health('D1_satisfaction')},
        ],
      };
    }

    // ── SVG レーダーチャート ─────────────────────────────
    function SVGRadar({ title, data, isHigh }) {
      const color = isHigh ? '#dc2626' : '#559018';
      const fill  = isHigh ? 'rgba(220,38,38,0.18)' : 'rgba(85,144,24,0.22)';
      const cx = 160, cy = 150, maxR = 84, n = data.length;

      const angle = i => (Math.PI * 2 * i) / n - Math.PI / 2;
      const pt    = (i, r) => [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];

      const grids = [1,2,3,4,5].map(lv => {
        const r = (maxR / 5) * lv;
        const pts = data.map((_,i) => pt(i,r).join(',')).join(' ');
        return <polygon key={lv} points={pts} fill={lv<=2?'rgba(220,38,38,0.06)':'none'}
                 stroke={lv<=2?'#fca5a5':'#d1d5db'} strokeWidth={lv<=2?1.2:0.7} />;
      });

      const axes = data.map((_,i) => {
        const [x,y] = pt(i, maxR);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e5e7eb" strokeWidth="0.8"/>;
      });

      const polyPts = data.map((d,i) => {
        const r = (Math.min(5, Math.max(1, d.value || 1)) / 5) * maxR;
        return pt(i, r).join(',');
      }).join(' ');

      const dots = data.map((d,i) => {
        const r = (Math.min(5, Math.max(1, d.value || 1)) / 5) * maxR;
        const [x,y] = pt(i, r);
        return <circle key={i} cx={x} cy={y} r="3.5" fill={color} stroke="white" strokeWidth="1"/>;
      });

      const labels = data.map((d,i) => {
        const [x,y] = pt(i, maxR + 22);
        const anchor = x < cx-5 ? 'end' : x > cx+5 ? 'start' : 'middle';
        const lines = d.label.length > 6 ? [d.label.slice(0,5), d.label.slice(5)] : [d.label];
        return (
          <text key={i} x={x} y={y} textAnchor={anchor} fontSize="8.5" fill="#374151" dominantBaseline="middle">
            {lines.map((l,j) => <tspan key={j} x={x} dy={j===0?0:11}>{l}</tspan>)}
          </text>
        );
      });

      return (
        <div style={S.chartCard}>
          <div style={{...S.chartTitle, color}}>{title}</div>
          <svg viewBox="0 0 320 300" width="100%" style={{display:'block'}}>
            {grids}{axes}
            <polygon points={polyPts} fill={fill} stroke={color} strokeWidth="2"/>
            {dots}{labels}
          </svg>
        </div>
      );
    }

    // ── 評価点テーブル行 ─────────────────────────────────
    function EpRow({ label, ep, star }) {
      // 非★は低い点が良い（左=良）, ★は高い点が良い（右=良）
      // 網掛け（要注意ゾーン）: 非★はcol4-5, ★はcol1-2
      const cols = [1,2,3,4,5];
      return (
        <tr>
          <td style={S.epLabel}>{label}{star ? ' ★' : ''}</td>
          {cols.map(c => {
            const active = ep === c;
            const shade = star ? c <= 2 : c >= 4;
            return (
              <td key={c} style={{
                ...S.epCell,
                background: shade ? '#fee2e2' : (c===3?'#fef9ee':'white'),
                fontWeight: active ? 700 : 400,
                color: active ? (shade?'#dc2626':'#559018') : '#9ca3af',
                fontSize: active ? 16 : 11,
              }}>
                {active ? '●' : '○'}
              </td>
            );
          })}
        </tr>
      );
    }

    // ── PDFダウンロード（html2pdf.js / SVG→Canvas変換）────
    async function downloadPDF() {
      const btn = document.getElementById('pdf-btn-bar');
      if (btn) btn.style.display = 'none';
      const el = document.getElementById('result-content');
      const replacements = [];

      // SVG を Canvas 経由で PNG data URL に変換
      function svgToPng(svg) {
        return new Promise((resolve, reject) => {
          try {
            const clone = svg.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
            const rect = svg.getBoundingClientRect();
            const w = Math.ceil(rect.width)  || 320;
            const h = Math.ceil(rect.height) || 300;
            clone.setAttribute('width',  w);
            clone.setAttribute('height', h);
            const svgStr = new XMLSerializer().serializeToString(clone);
            const b64    = btoa(unescape(encodeURIComponent(svgStr)));
            const dataUrl = 'data:image/svg+xml;base64,' + b64;
            const tmpImg = new Image();
            tmpImg.onload = () => {
              const cvs = document.createElement('canvas');
              cvs.width  = w * 2;
              cvs.height = h * 2;
              const ctx  = cvs.getContext('2d');
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, cvs.width, cvs.height);
              ctx.scale(2, 2);
              ctx.drawImage(tmpImg, 0, 0, w, h);
              resolve({ png: cvs.toDataURL('image/png'), w, h });
            };
            tmpImg.onerror = reject;
            tmpImg.src = dataUrl;
          } catch(e) { reject(e); }
        });
      }

      // 全 SVG を PNG img に差し替え
      try {
        for (const svg of Array.from(el.querySelectorAll('svg'))) {
          try {
            const { png, w, h } = await svgToPng(svg);
            const img = document.createElement('img');
            img.src = png;
            img.style.cssText = `width:${w}px;height:${h}px;display:block;max-width:100%;background:#fff;`;
            svg.parentNode.insertBefore(img, svg.nextSibling);
            svg.style.display = 'none';
            replacements.push({ svg, img });
          } catch(e) { console.warn('SVG変換スキップ:', e); }
        }
      } catch(e) { /* 継続 */ }

      const filename = (meta.name || 'ストレスチェック') + 'さんのストレスチェック結果.pdf';

      // スクロール位置を一番上にリセット（x座標ズレ防止）
      window.scrollTo(0, 0);

      // 撮影前: cssText で座標・幅・余白を完全固定
      const originalCssText = el.style.cssText;
      el.style.cssText = [
        'width: 1000px !important',
        'max-width: 1000px !important',
        'margin: 0 !important',
        'padding: 40px !important',
        'position: relative !important',
        'left: 0 !important',
        'top: 0 !important',
        'transform: none !important',
        'box-sizing: border-box !important',
      ].join(';') + ';';

      const opt = {
        margin:      0,
        filename:    filename,
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale:       2,
          useCORS:     true,
          allowTaint:  true,
          logging:     false,
          width:       1000,
          windowWidth: 1000,
          x:           0,
          y:           0,
          scrollX:     0,
          scrollY:     0,
        },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:   { mode: ['css', 'legacy'] },
      };

      // 復元ヘルパー
      const restore = () => {
        el.style.cssText = originalCssText;
        for (const { svg, img } of replacements) {
          svg.style.display = '';
          img.remove();
        }
        if (btn) btn.style.display = '';
      };

      try {
        await html2pdf().set(opt).from(el).save();
      } catch(e) {
        console.error('PDF生成エラー:', e);
      } finally {
        restore();
      }
    }

    // ── メインコンポーネント ──────────────────────────────
    function ResultPage() {
      const isHigh = meta.is_high_stress;
      const prof   = calcProfile(answers, meta.gender);
      const { ep, sumA, sumB, sumC } = prof;
      const adv    = meta.advice_detail || {};

      const aRows = [
        {label:'心理的な仕事の負担（量）', key:'A1_quantity',     star:false},
        {label:'心理的な仕事の負担（質）', key:'A2_quality',      star:false},
        {label:'自覚的な身体的負担度',     key:'A3_physical',     star:false},
        {label:'職場の対人関係でのストレス',key:'A4_interpersonal',star:false},
        {label:'職場環境によるストレス',   key:'A5_environment',  star:false},
        {label:'仕事のコントロール度',     key:'A6_control',      star:true},
        {label:'技能の活用度',             key:'A7_skill',        star:true},
        {label:'仕事の適性度',             key:'A8_suitability',  star:true},
        {label:'働きがい',                 key:'A9_reward',       star:true},
      ];
      const bRows = [
        {label:'活気',     key:'B1_vigor',      star:true},
        {label:'イライラ感',key:'B2_irritation', star:false},
        {label:'疲労感',   key:'B3_fatigue',    star:false},
        {label:'不安感',   key:'B4_anxiety',    star:false},
        {label:'抑うつ感', key:'B5_depression', star:false},
        {label:'身体愁訴', key:'B6_physical',   star:false},

      const cRows = [
        {label:'上司からのサポート',     key:'C1_boss',         star:true},
        {label:'同僚からのサポート',     key:'C2_coworker',     star:true},
        {label:'家族や友人からのサポート',key:'C3_family',       star:true},
        {label:'仕事や生活の満足度',     key:'D1_satisfaction', star:true},
      ];

      return (
        <div style={S.wrap}>
          {/* PDF出力対象コンテンツ */}
          <div id="result-content">
          {/* ヘッダー */}
          <div style={S.header}>
            <div style={S.hl}>
              <div style={S.logo}>STRESS CHECK PROGRAM</div>
              <h1 style={S.h1}>{meta.name}さんのストレスプロフィール</h1>
              <p style={S.sub}>※ この結果は目安です。詳細は産業医・保健師にご相談ください。</p>
            </div>
            <div style={S.hr}>
              <div style={S.mRow}><span style={S.mL}>氏名</span><span style={S.mV}>{meta.name} 様</span></div>
              <div style={S.mRow}><span style={S.mL}>所属</span><span style={S.mV}>{meta.workplace_name}</span></div>
              <div style={S.mRow}><span style={S.mL}>実施日</span><span style={S.mV}>{meta.exam_date}</span></div>
              <div style={S.mRow}><span style={S.mL}>社員ID</span><span style={{...S.mV,fontFamily:'monospace',fontWeight:700}}>{meta.employee_id}</span></div>
            </div>
          </div>

          {/* 判定バナー */}
          {isHigh ? (
            <div style={{...S.banner,...S.bannerRed,overflow:'visible'}}>
              <span style={S.icon}>⚠️</span>
              <div style={{flex:1,overflow:'visible'}}>
                <div style={{...S.bHead,color:'#991b1b'}}>高ストレス者に該当します（面接指導の対象）</div>
                <div style={{...S.bBody,fontWeight:600,color:'#7f1d1d',lineHeight:2.0,paddingBottom:8}}>
                  ストレスチェック結果におきまして、高ストレス者判定基準に該当していました。このような状態が続きますと大変心配ですので、<strong>医師による面接指導</strong>をお勧めします。希望される場合、結果を社内の担当者に開示の上、面接の準備を行います。ご不明な点がございましたら実施者または実施事務従事者までお問い合わせください。
                </div>
                <div style={{height:16,width:'100%'}}></div>
              </div>
            </div>
          ) : (
            <div style={{...S.banner,...S.bannerGreen,overflow:'visible'}}>
              <span style={S.icon}>✅</span>
              <div style={{flex:1,overflow:'visible'}}>
                <div style={{...S.bHead,color:'#166534'}}>心身の健康面において特に問題はみられませんでした</div>
                <div style={{...S.bBody,lineHeight:2.0,paddingBottom:8}}>
                  ストレスチェック結果におきまして、心身の健康面において特に問題はみられませんでした。何かご心配なことなどございましたら社内外の相談窓口や産業医面談もご活用ください。これからもご自身の健康維持と職場環境の改善にご協力をお願いいたします。
                </div>
                <div style={{height:16,width:'100%'}}></div>
              </div>
            </div>
          )}

          {/* レーダーチャート3枚 */}
          <div className="radar-grid">
            <SVGRadar title="ストレスの原因と考えられる因子" data={prof.factors}   isHigh={isHigh}/>
            <SVGRadar title="ストレスによっておこる心身の反応"  data={prof.reactions} isHigh={isHigh}/>
            <SVGRadar title="ストレス反応に影響を与える他の因子" data={prof.supports}  isHigh={isHigh}/>
          </div>
          <div style={S.chartGuideBox}>
            <div style={S.chartGuideTitle}>💡 【グラフの見方】</div>
            <p style={S.chartGuideText}>グラフが外側に広がるほど良好な状態です。逆に、中心の赤いエリアに近づくほど、ストレスが蓄積しているサインとなります。</p>
          </div>

          {/* 改ページ②：詳細スコア */}
          <div className="html2pdf__page-break"></div>
          {/* 評価点テーブル */}
          <div style={S.card} className="print-no-break">
            <h3 style={S.sec}>詳細スコア（評価点）</h3>
            <p style={S.hint}>

            <table style={S.tbl}>

                <tr><td colSpan={6} style={S.secRow}>【ストレスによっておこる心身の反応】<span style={S.total}>小計 {sumB} 点</span></td></tr>
                {bRows.map(r => <EpRow key={r.key} label={r.label} ep={ep[r.key]} star={r.star}/>)}
                <tr><td colSpan={6} style={S.secRow}>【ストレス反応に影響を与える他の因子】<span style={S.total}>小計 {sumC} 点</span></td></tr>
                {cRows.map(r => <EpRow key={r.key} label={r.label} ep={ep[r.key]} star={r.star}/>)}
                <tr><td colSpan={6} style={S.totalRow}>合計（総合計）<span style={{...S.total, fontSize:15, color:'white'}}>{sumA + sumB + sumC} 点</span></td></tr>
              </tbody>
            </table>
          </div>

          {/* ── 個別アドバイスセクション ── */}
          {adv.area_a && (() => {
            // 領域ごとの色定義
            const LEVEL_COLOR = {
              very_high: {bg:'#fef2f2', border:'#fca5a5', badge:'#dc2626', badgeTxt:'white'},
              high:      {bg:'#fff7ed', border:'#fdba74', badge:'#ea580c', badgeTxt:'white'},
              low:       {bg:'#fef2f2', border:'#fca5a5', badge:'#dc2626', badgeTxt:'white'},
              mid:       {bg:'#fffbeb', border:'#fcd34d', badge:'#d97706', badgeTxt:'white'},
              good:      {bg:'#f0fdf4', border:'#86efac', badge:'#16a34a', badgeTxt:'white'},
            };
            const getColor = (level) =>
              LEVEL_COLOR[level] || LEVEL_COLOR.mid;

            // 領域ブロック描画ヘルパー
            const AreaBlock = ({domainLabel, area}) => {
              const c = getColor(area.level);
              return (
                <div style={{background:c.bg, border:`1.5px solid ${c.border}`,
                    borderRadius:10, padding:'10px 12px', marginBottom:8}}>
                  {/* 領域名 + 合計点バッジ */}
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#1e293b'}}>{domainLabel}</span>
                    <span style={{fontSize:11,background:c.badge,color:c.badgeTxt,
                        borderRadius:20,padding:'2px 10px',fontWeight:600}}>
                      {area.level_text}
                    </span>
                  </div>

                  {/* 合計点ベースのサマリー文（常に表示） */}
                  <div style={{fontSize:13,color:'#374151',lineHeight:1.9,marginBottom:
                      area.problems && area.problems.length > 0 ? 10 : 0}}>
                    {area.summary_text}
                  </div>

                  {/* ep<=2 の問題項目（ある場合のみ） */}
                  {area.problems && area.problems.length > 0 && (
                    <div>
                      <div style={{fontSize:12,color:'#64748b',marginBottom:6}}>
                        ⚠️ 特に以下の項目でストレスのサインが見られます：
                      </div>
                      {area.problems.map((p, i) => (
                        <div key={i} style={{background:'white',border:'1px solid #e2e8f0',
                            borderRadius:7,padding:'7px 10px',marginBottom:5}}>
                          <div style={{fontSize:12,fontWeight:700,color:'#be123c',marginBottom:4}}>
                            ▶ {p.label}
                          </div>
                          <div style={{fontSize:12,color:'#374151',lineHeight:1.85}}>
                            {p.detail}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            };

            return (
              <>
              <div className="html2pdf__page-break"></div>
              <div style={{...S.card,padding:'12px 16px',pageBreakInside:'auto',breakInside:'auto'}}>
                <h3 style={{...S.sec,marginBottom:10}}>📊 個々の領域におけるストレス状況</h3>

                {/* 全良好メッセージ */}
                {!adv.any_problems && (
                  <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:8,
                      padding:'12px 16px',marginBottom:14,fontSize:13,color:'#166534',lineHeight:1.8}}>
                    ✅ {adv.all_ok_message}
                  </div>
                )}

                <AreaBlock domainLabel="【A領域】ストレスの原因と考えられる因子" area={adv.area_a} />
                <AreaBlock domainLabel="【B領域】ストレスによっておこる心身の反応" area={adv.area_b} />
                <AreaBlock domainLabel="【C領域】ストレス反応に影響を与える他の因子（サポート）" area={adv.area_c} />

                {/* 改ページ④：セルフケア */}
                <div className="html2pdf__page-break"></div>
                {/* セルフケアのポイント */}
                <h3 style={{...S.sec,marginTop:16,marginBottom:6}}>
                  🌿 セルフケアのポイント
                </h3>
                {/* 繋ぎの文 */}
                <p style={{fontSize:12,color:'#475569',marginBottom:12,lineHeight:1.8,
                    background:'#f8faff',border:'1px solid #bfdbfe',borderRadius:6,padding:'8px 12px'}}>
                  {adv.selfcare_intro}
                </p>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
                  {(adv.selfcare || []).map(tip => (
                    <div key={tip.key} style={{background:'#f8faff',border:'1px solid #bfdbfe',
                        borderRadius:8,padding:'12px 14px'}}>
                      <div style={{fontSize:13,fontWeight:700,color:'#1e40af',marginBottom:6}}>
                        {tip.icon}　{tip.title}
                      </div>
                      <ul style={{paddingLeft:16,margin:0}}>
                        {(tip.items || []).map((item, i) => (
                          <li key={i} style={{fontSize:12,color:'#374151',lineHeight:1.8,marginBottom:2}}>
                            {item}
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
              </>
            );
          })()}

          {/* PDFダウンロードボタン（セルフケア直後・相談窓口直前） */}
          <div id="pdf-btn-bar" style={{display:'flex',justifyContent:'center',margin:'24px 0'}}>
            <button onClick={downloadPDF} style={S.pdfBtn}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:7,verticalAlign:'middle',flexShrink:0}}>
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              結果をPDFでダウンロード
            </button>
          </div>

          {/* 改ページ⑤：相談窓口 */}
          <div className="html2pdf__page-break"></div>
          {/* 相談窓口 */}
          <div style={S.card}>
            <h3 style={{...S.sec,marginBottom:12}}>📞 相談窓口のご案内</h3>
            <div style={S.cGrid}>
              <div style={S.cItem}><strong style={{color:'#3d6e0a'}}>【誰に】</strong><br/>産業医 または 保健師</div>
              <div style={S.cItem}><strong style={{color:'#3d6e0a'}}>【いつ】</strong><br/>結果通知後、1ヶ月以内を目安に</div>
              <div style={S.cItem}><strong style={{color:'#3d6e0a'}}>【どうやって】</strong><br/>人事部 健康管理担当へご連絡</div>
            </div>

            {/* 外部相談窓口・お役立ち情報 */}
            <div style={S.extBox}>
              <h4 style={S.extTitle}>🌐 外部のお役立ち情報・相談窓口</h4>
              <p style={S.extText}>

              </div>
            </div>
          </div>
          </div>{/* /result-content */}
        </div>
      );
    }

    // ── スタイル ─────────────────────────────────────────
    const S = {
      wrap:      {fontFamily:"'Noto Sans JP',sans-serif",maxWidth:1060,margin:'0 auto',padding:'24px 14px 60px',background:'#f2f5ee',minHeight:'100vh'},
      pdfBar:    {display:'flex',justifyContent:'flex-end',marginBottom:14},
      pdfBtn:    {display:'inline-flex',alignItems:'center',gap:0,padding:'10px 22px',background:'#1d4ed8',color:'white',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',boxShadow:'0 2px 6px rgba(29,78,216,0.35)',letterSpacing:'0.02em'},
      header:    {display:'flex',justifyContent:'space-between',alignItems:'flex-start',background:'#3d6e0a',borderRadius:12,padding:'20px 26px',marginBottom:18,flexWrap:'wrap',gap:14},
      hl:        {flex:'1 1 280px'},
      logo:      {fontSize:10,fontWeight:700,letterSpacing:'0.15em',color:'rgba(255,255,255,0.65)',marginBottom:5},
      h1:        {fontSize:19,fontWeight:700,color:'white',marginBottom:3},
      sub:       {fontSize:10,color:'rgba(255,255,255,0.72)'},
      hr:        {flex:'0 0 auto',background:'rgba(255,255,255,0.12)',borderRadius:8,padding:'12px 16px',minWidth:210},
      mRow:      {display:'flex',gap:8,marginBottom:3,fontSize:12,color:'white'},
      mL:        {opacity:0.72,minWidth:52,flexShrink:0},
      mV:        {fontWeight:600},
      banner:    {display:'flex',alignItems:'flex-start',gap:14,padding:'20px 24px',borderRadius:10,marginBottom:20,borderWidth:1,borderStyle:'solid',overflow:'visible'},
      bannerRed: {background:'#fef2f2',borderColor:'#fca5a5'},
      bannerGreen:{background:'#f0fdf4',borderColor:'#86efac'},
      icon:      {fontSize:24,flexShrink:0,marginTop:1},
      bHead:     {fontSize:15,fontWeight:700,marginBottom:6},
      bBody:     {fontSize:12,color:'#374151',lineHeight:2.0},
      charts:        {},  /* CSSクラス radar-grid に移行 */
      chartCard:     {background:'white',borderRadius:10,padding:'14px 6px 8px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)'},
      chartTitle:    {fontSize:12,fontWeight:700,textAlign:'center',marginBottom:2},
      chartNote:     {fontSize:9,textAlign:'center',color:'#9ca3af',marginTop:2},
      chartGuideBox: {background:'#e8f4f8',borderRadius:8,padding:'14px 20px',marginBottom:18,textAlign:'center',border:'1px solid #b3d9ea'},
      chartGuideTitle:{fontSize:13,fontWeight:700,color:'#1a5276',marginBottom:5},
      chartGuideText: {fontSize:12,color:'#374151',lineHeight:1.7,margin:0},
      card:      {background:'white',borderRadius:10,padding:'18px 22px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',marginBottom:16},
      sec:       {fontSize:14,fontWeight:700,color:'#3d6e0a',marginBottom:8,paddingBottom:5,borderBottom:'2px solid #8cc030'},
      hint:      {fontSize:11,color:'#6b7280',marginBottom:10},
      tbl:       {width:'100%',borderCollapse:'collapse',fontSize:12},
      th:        {padding:'5px 4px',fontWeight:600,fontSize:11,textAlign:'center'},
      epLabel:   {padding:'7px 10px',borderBottom:'1px solid #f3f4f6',fontSize:12,color:'#374151'},
      epCell:    {padding:'4px 3px',borderBottom:'1px solid #f3f4f6',textAlign:'center',width:'9%'},
      secRow:    {padding:'5px 8px',background:'#f0f4e8',fontWeight:700,fontSize:12,color:'#3d6e0a'},
      total:     {float:'right',fontWeight:700,fontSize:13,color:'#1a4d00'},
      totalRow:  {padding:'6px 10px',background:'#1a4d00',color:'white',fontWeight:700,fontSize:13},
      note:      {marginTop:10,padding:'7px 10px',background:'#f9fafb',borderRadius:6,fontSize:10,color:'#9ca3af',borderLeft:'3px solid #d1d5db'},
      cGrid:     {display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10},
      cItem:     {background:'#f9fafb',borderRadius:8,padding:'12px 14px',fontSize:12,color:'#374151',lineHeight:1.7},
      extBox:    {marginTop:20,paddingTop:16,borderTop:'1px solid #e5e7eb'},
      extTitle:  {fontSize:13,fontWeight:700,color:'#3d6e0a',marginBottom:8},
      extText:   {fontSize:12,color:'#6b7280',lineHeight:1.8,marginBottom:14},
      extBanners:{display:'flex',flexWrap:'wrap',gap:16},
      extBannerLink:{display:'block',flexShrink:0},
      extBannerImg: {display:'block',maxWidth:'100%',height:'auto',borderRadius:4},
    };

    // ── レンダリング ─────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<ResultPage/>);

  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="padding:40px;color:#dc2626;font-family:sans-serif;">' +
      '<h2>表示エラー</h2><pre style="margin-top:12px;font-size:12px;">' +
      e.message + '</pre></div>';
    console.error('ResultPage error:', e);
  }
</script>{% endraw %}
</body>
