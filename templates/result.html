<body>

    "female": {

      "A5_environment":   [{"min":4,"max":4,"point":1},{"min":3,"max":3,"point":2},{"min":2,"max":2,"point":3},{"min":1,"max":1,"point":4}],
      "A6_control":       [{"min":3,"max":5,"point":1},{"min":6,"max":7,"point":2},{"min":8,"max":9,"point":3},{"min":10,"max":11,"point":4},{"min":12,"max":15,"point":5}],

      "A9_reward":        [{"min":4,"max":4,"point":1},{"min":3,"max":3,"point":2},{"min":2,"max":2,"point":3},{"min":1,"max":1,"point":4}],
      "B1_vigor":         [{"min":3,"max":3,"point":1},{"min":4,"max":5,"point":2},{"min":6,"max":7,"point":3},{"min":8,"max":9,"point":4},{"min":10,"max":12,"point":5}],
      "B2_irritation":    [{"min":9,"max":12,"point":1},{"min":7,"max":8,"point":2},{"min":5,"max":6,"point":3},{"min":3,"max":4,"point":4},{"min":1,"max":2,"point":5}],
      "B3_fatigue":       [{"min":9,"max":12,"point":1},{"min":7,"max":8,"point":2},{"min":5,"max":6,"point":3},{"min":3,"max":4,"point":4},{"min":1,"max":2,"point":5}],
      "B4_anxiety":       [{"min":9,"max":12,"point":1},{"min":7,"max":8,"point":2},{"min":5,"max":6,"point":3},{"min":3,"max":4,"point":4},{"min":1,"max":2,"point":5}],
      "B5_depression":    [{"min":19,"max":24,"point":1},{"min":15,"max":18,"point":2},{"min":11,"max":14,"point":3},{"min":7,"max":10,"point":4},{"min":3,"max":6,"point":5}],
      "B6_physical":      [{"min":35,"max":44,"point":1},{"min":28,"max":34,"point":2},{"min":21,"max":27,"point":3},{"min":14,"max":20,"point":4},{"min":7,"max":13,"point":5}],
      "C1_boss":          [{"min":3,"max":4,"point":1},{"min":5,"max":6,"point":2},{"min":7,"max":9,"point":3},{"min":10,"max":11,"point":4},{"min":12,"max":12,"point":5}],
      "C2_coworker":      [{"min":3,"max":4,"point":1},{"min":5,"max":6,"point":2},{"min":7,"max":9,"point":3},{"min":10,"max":11,"point":4},{"min":12,"max":12,"point":5}],
      "C3_family":        [{"min":3,"max":4,"point":1},{"min":5,"max":6,"point":2},{"min":7,"max":9,"point":3},{"min":10,"max":11,"point":4},{"min":12,"max":12,"point":5}]

  </script>

  {% raw %}<script type="text/babel">
    // ── データ読み込み ────────────────────────────────────
    const answers = JSON.parse(document.getElementById('answers-data').textContent);
    const meta    = JSON.parse(document.getElementById('meta-data').textContent);
    const conversionTable = JSON.parse(document.getElementById('conversion-table').textContent);

    // ── calculateStressProfile ────────────────────────────
    function calculateStressProfile(q, gender) {
      const rawScores = {
        A1_quantity:      15 - (q.q1  + q.q2  + q.q3),
        A2_quality:       15 - (q.q4  + q.q5  + q.q6),
        A3_physical:       5 -  q.q7,
        A6_control:       15 - (q.q8  + q.q9  + q.q10),
        A7_skill:               q.q11,
        A4_interpersonal: 10 - (q.q12 + q.q13) + q.q14,
        A5_environment:    5 -  q.q15,
        A8_suitability:    5 -  q.q16,
        A9_reward:         5 -  q.q17,
        B1_vigor:          q.q18 + q.q19 + q.q20,
        B2_irritation:     q.q21 + q.q22 + q.q23,
        B3_fatigue:        q.q24 + q.q25 + q.q26,
        B4_anxiety:        q.q27 + q.q28 + q.q29,
        B5_depression:     q.q30 + q.q31 + q.q32 + q.q33 + q.q34 + q.q35,
        B6_physical:       q.q36+q.q37+q.q38+q.q39+q.q40+q.q41+q.q42+q.q43+q.q44+q.q45+q.q46,
        C1_boss:     15 - (q.q47 + q.q50 + q.q53),
        C2_coworker: 15 - (q.q48 + q.q51 + q.q54),
        C3_family:   15 - (q.q49 + q.q52 + q.q55),
      };
      const getEvalPoint = (key, raw) => {
        const table = conversionTable[gender]?.[key];
        if (!table) return 3;
        const match = table.find(t => raw >= t.min && raw <= t.max);
        return match ? match.point : 3;
      };
      const evalScores = {};
      let sumA = 0, sumB = 0, sumC = 0;
      for (const [key, raw] of Object.entries(rawScores)) {
        const pt = getEvalPoint(key, raw);
        evalScores[key] = pt;
        if (key.startsWith('A')) sumA += pt;
        if (key.startsWith('B')) sumB += pt;
        if (key.startsWith('C')) sumC += pt;
      }
      const sumAC = sumA + sumC;
      const isHighStress = sumB <= 12 || (sumB <= 17 && sumAC <= 26);
      return {
        isHighStress,
        summaryScores: { sumA, sumB, sumC, sumAC },
        radarChartData: {
          stressFactors:   [evalScores.A1_quantity,evalScores.A2_quality,evalScores.A3_physical,evalScores.A4_interpersonal,evalScores.A5_environment,evalScores.A6_control,evalScores.A7_skill,evalScores.A8_suitability,evalScores.A9_reward],
          stressReactions: [evalScores.B1_vigor,evalScores.B2_irritation,evalScores.B3_fatigue,evalScores.B4_anxiety,evalScores.B5_depression,evalScores.B6_physical],
          supports:        [evalScores.C1_boss,evalScores.C2_coworker,evalScores.C3_family],
        },
      };
    }

    // ── SVG レーダーチャート（外部ライブラリ不要） ─────────
    function SVGRadar({ title, data, isHigh }) {
      const color  = isHigh ? '#dc2626' : '#559018';
      const fill   = isHigh ? 'rgba(220,38,38,0.18)' : 'rgba(85,144,24,0.22)';
      const cx = 110, cy = 110, maxR = 85, levels = 5, n = data.length;

      // グリッド・軸の座標を計算
      const angle = (i) => (Math.PI * 2 * i) / n - Math.PI / 2;
      const pt = (i, r) => [
        cx + r * Math.cos(angle(i)),
        cy + r * Math.sin(angle(i)),
      ];

      // データポリゴン
      const polyPts = data.map((d, i) => {
        const r = (d.value / 5) * maxR;
        return pt(i, r).join(',');
      }).join(' ');

      // グリッド（5段階）
      const grids = Array.from({ length: levels }, (_, li) => {
        const r = (maxR / levels) * (li + 1);
        const pts = Array.from({ length: n }, (_, i) => pt(i, r).join(',')).join(' ');
        return <polygon key={li} points={pts} fill="none" stroke="#d1d5db" strokeWidth="0.8" />;
      });

      // 軸線
      const axes = data.map((_, i) => {
        const [x, y] = pt(i, maxR);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#d1d5db" strokeWidth="0.8" />;
      });

      // ラベル
      const labels = data.map((d, i) => {
        const [x, y] = pt(i, maxR + 16);
        const anchor = x < cx - 4 ? 'end' : x > cx + 4 ? 'start' : 'middle';
        const lines = d.label.length > 5 ? [d.label.slice(0,5), d.label.slice(5)] : [d.label];
        return (
          <text key={i} x={x} y={y} textAnchor={anchor} fontSize="9" fill="#374151" dominantBaseline="middle">
            {lines.map((l, j) => <tspan key={j} x={x} dy={j === 0 ? 0 : 11}>{l}</tspan>)}
          </text>
        );
      });

      // スコアドット
      const dots = data.map((d, i) => {
        const r = (d.value / 5) * maxR;
        const [x, y] = pt(i, r);
        return <circle key={i} cx={x} cy={y} r="3" fill={color} />;
      });

      return (
        <div style={S.chartCard}>
          <div style={{...S.chartTitle, color}}>{title}</div>
          <svg viewBox="0 0 220 220" width="100%" style={{display:'block'}}>
            {grids}
            {axes}
            <polygon points={polyPts} fill={fill} stroke={color} strokeWidth="2" />
            {dots}
            {labels}
          </svg>
        </div>
      );
    }

    // ── メイン結果コンポーネント ──────────────────────────
    function StressProfileResult({ isHighStress, summaryScores, radarChartData }) {
      const { sumA, sumB, sumC, sumAC } = summaryScores;

      const factors = [
        {label:'量的負担',     value:radarChartData.stressFactors[0]},
        {label:'質的負担',     value:radarChartData.stressFactors[1]},
        {label:'身体的負担',   value:radarChartData.stressFactors[2]},
        {label:'対人関係',     value:radarChartData.stressFactors[3]},
        {label:'職場環境',     value:radarChartData.stressFactors[4]},
        {label:'コントロール', value:radarChartData.stressFactors[5]},
        {label:'技術活用',     value:radarChartData.stressFactors[6]},
        {label:'適合性',       value:radarChartData.stressFactors[7]},
        {label:'働きがい',     value:radarChartData.stressFactors[8]},
      ];
      const reactions = [
        {label:'活気',       value:radarChartData.stressReactions[0]},
        {label:'イライラ感', value:radarChartData.stressReactions[1]},
        {label:'疲労感',     value:radarChartData.stressReactions[2]},
        {label:'不安感',     value:radarChartData.stressReactions[3]},
        {label:'抑うつ感',   value:radarChartData.stressReactions[4]},
        {label:'身体愁訴',   value:radarChartData.stressReactions[5]},
      ];
      const supports = [
        {label:'上司サポート',       value:radarChartData.supports[0]},
        {label:'同僚サポート',       value:radarChartData.supports[1]},
        {label:'家族・友人サポート', value:radarChartData.supports[2]},
      ];

      return (
        <div style={S.wrapper}>
          {/* ページヘッダー */}
          <div style={S.pageHeader}>
            <div style={S.headerLeft}>
              <div style={S.headerLogo}>STRESS CHECK PROGRAM</div>
              <h1 style={S.pageTitle}>ストレスプロフィール（個人結果）</h1>
              <p style={S.pageSub}>※ この結果は目安です。詳細は産業医・保健師にご相談ください。</p>
            </div>
            <div style={S.headerRight}>
              <div style={S.metaRow}><span style={S.metaLabel}>氏名</span><span style={S.metaValue}>{meta.name} 様</span></div>
              <div style={S.metaRow}><span style={S.metaLabel}>所属</span><span style={S.metaValue}>{meta.workplace_name}</span></div>
              <div style={S.metaRow}><span style={S.metaLabel}>実施日</span><span style={S.metaValue}>{meta.exam_date}</span></div>
              <div style={S.metaRow}><span style={S.metaLabel}>整理番号</span><span style={{...S.metaValue,fontFamily:'monospace',fontWeight:700}}>{meta.ref_number}</span></div>
            </div>
          </div>

          {/* 判定バナー */}
          {isHighStress ? (
            <div style={{...S.banner,...S.bannerHigh}}>
              <span style={S.bannerIcon}>⚠️</span>
              <div>
                <div style={{...S.bannerHeading,color:'#991b1b'}}>高ストレス者に該当します</div>
                <div style={S.bannerBody}>
                  現在の結果から、ストレスが高い状態にあると考えられます。<br/>
                  産業医との面接指導をご検討ください。申し出は任意であり、結果は本人の同意なく事業者に通知されません。
                </div>
              </div>
            </div>
          ) : (
            <div style={{...S.banner,...S.bannerOk}}>
              <span style={S.bannerIcon}>✅</span>
              <div>
                <div style={{...S.bannerHeading,color:'#166534'}}>ストレス状態は概ね良好です</div>
                <div style={S.bannerBody}>
                  現在のストレス状態に特に大きな問題は見られません。引き続きセルフケアを心がけましょう。
                </div>
              </div>
            </div>
          )}

          {/* レーダーチャート 3枚 */}
          <div style={S.chartsRow}>
            <SVGRadar title="① 仕事のストレス要因" data={factors}   isHigh={isHighStress} />
            <SVGRadar title="② 心身のストレス反応"  data={reactions} isHigh={isHighStress} />
            <SVGRadar title="③ 周囲のサポート"      data={supports}  isHigh={isHighStress} />
          </div>
          <div style={S.scaleLegend}>
            <span style={{...S.scaleBadge,background:'#fef2f2',color:'#dc2626'}}>← 中心 = 1点（高ストレス）</span>
            <span style={{...S.scaleBadge,background:'#f0f5e8',color:'#559018'}}>外周 = 5点（良好）→</span>
          </div>

          {/* スコア表 */}
          <div style={S.tableWrap}>
            <h3 style={S.sectionTitle}>詳細スコア</h3>
            <table style={S.table}>
              <thead>
                <tr>
                  <th style={{...S.th,textAlign:'left'}}>領域</th>
                  <th style={S.th}>得点</th>
                  <th style={S.th}>範囲</th>
                  <th style={{...S.th,textAlign:'left'}}>補足</th>
                </tr>
              </thead>
              <tbody>
                {[
                  {label:'領域A　仕事のストレス要因', val:sumA,  range:'9〜45点',  note:'高いほど良好'},
                  {label:'領域B　心身のストレス反応',  val:sumB,  range:'6〜30点',  note:'高いほど良好'},
                  {label:'領域C　周囲のサポート',      val:sumC,  range:'3〜15点',  note:'高いほどサポート豊富'},
                  {label:'領域A＋C　合計',             val:sumAC, range:'12〜60点', note:'高ストレス判定の補助指標'},
                ].map((r,i) => (
                  <tr key={r.label} style={{background:i%2===0?'#f9fafb':'white'}}>
                    <td style={S.td}>{r.label}</td>
                    <td style={{...S.td,textAlign:'center',fontWeight:700,color:'#559018',fontSize:16}}>{r.val}</td>
                    <td style={{...S.td,textAlign:'center',color:'#6b7280',fontSize:12}}>{r.range}</td>
                    <td style={{...S.td,fontSize:12,color:'#6b7280'}}>{r.note}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={S.criteriaBox}>
              <strong>判定基準：</strong>①領域B ≤ 12点、または ②領域B ≤ 17点 かつ 領域A＋C ≤ 26点
            </div>
          </div>

          {/* 相談窓口 */}
          <div style={S.consultBox}>
            <h3 style={{...S.sectionTitle,marginBottom:12}}>📞 相談窓口のご案内</h3>
            <p style={{fontSize:13,color:'#374151',marginBottom:12}}>
              結果に不安がある場合や不調が続く場合は、一人で抱え込まずにご相談ください。
            </p>
            <div style={S.consultGrid}>
              <div style={S.consultItem}><strong style={{color:'#3d6e0a'}}>【誰に】</strong><br/>産業医 または 保健師</div>
              <div style={S.consultItem}><strong style={{color:'#3d6e0a'}}>【いつ】</strong><br/>結果通知後、1ヶ月以内を目安に</div>
              <div style={S.consultItem}><strong style={{color:'#3d6e0a'}}>【どうやって】</strong><br/>人事部 健康管理担当へご連絡</div>
            </div>
          </div>
        </div>
      );
    }

    // ── スタイル定義 ──────────────────────────────────────
