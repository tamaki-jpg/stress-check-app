<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ログイン | ストレスチェック</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #faf8f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .card-header {
      background: #ffffff;
      border-bottom: 3px solid #54b3a4;
      padding: 28px 32px 24px;
      text-align: center;
    }
    .card-header .badge {
      display: inline-block;
      background: rgba(84, 179, 164, 0.08);
      border: 1px solid rgba(84, 179, 164, 0.2);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #54b3a4;
      padding: 3px 12px;
      margin-bottom: 10px;
    }
    .card-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #4a5568;
    }
    .card-header .sub {
      font-size: 11px;
      color: #54b3a4;
      font-weight: 600;
      margin-top: 6px;
    }
    .card-body {
      padding: 32px;
    }
    .error-box {
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c53030;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: #f9fafb;
      border: 1.5px solid #d1d9e0;
      border-radius: 8px;
      color: #1a202c;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      transition: all 0.2s;
      appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: #54b3a4;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(84, 179, 164, 0.15);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #54b3a4 0%, #38b2ac 100%);
      border: none;
      border-radius: 24px;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      margin-top: 8px;
    }
    .btn-login:hover {
      filter: brightness(1.05);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(84, 179, 164, 0.3);
    }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #9aa5b4;
      margin-top: 20px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <div class="badge">Admin Login</div>
      <h1>管理者ログイン</h1>
      <div class="sub">つばさ社会保険労務士事務所</div>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="error-box">⚠️ {{ error }}</div>
      {% endif %}
      <form method="POST" action="/admin/login">
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="管理者メールアドレス" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">パスワード</label>
          <input class="form-input" type="password" id="password" name="password"
            placeholder="パスワード" required autocomplete="current-password" />
        </div>
        <button class="btn-login" type="submit">
          ワンタイムパスワードを送信する →
        </button>
      </form>
    </div>
  </div>
  <div class="footer-note">
    正しい認証情報を入力すると、登録メールアドレスに<br>6桁のワンタイムパスワードが届きます。
  </div>
</body>
</html>
